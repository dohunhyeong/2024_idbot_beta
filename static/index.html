<!DOCTYPE html>
<html lang="ko"> <!-- lang(언어) = 한국어 -->
<head>
    <meta charset="UTF-8"> <!-- charset : 문서의 문자 인코딩을 utf-8로 지정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- viewport : 반응형 디자인 : 창을 줄이거나 늘려도 자동으로 맞춰줌-->
    <title>법정감염병 챗봇</title>
    <link rel="stylesheet" href="/static/styles.css"><!-- static/style.css 를 이용해서 해당 html 파일을 꾸며주겠다.-->
</head>
<body>
    <div class="container">
        <h1>법정감염병 챗봇</h1>
        <div class="url-input-container">
            <input type="text" id="url-input" placeholder="Enter website URL"> <!-- URL 을 입력하도록 하는 창 -->
            <button onclick="processURL()">Process URL</button> <!-- URL 입력 버튼, 버튼이 눌려지면 javascripts 함수인 processURL() 이 실행됨 -->
        </div>
        <div id="chat-container"></div>
        <div class="query-input-container"> <!-- 사용자의 질문 입력 창-->
            <input type="text" id="query-input" placeholder="Ask a question">
            <button onclick="askQuestion()">Ask</button> <!-- 질문 입력 버튼, 버튼이 눌려지면 javascripts 함수인 processURL() 이 실행됨-->
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
